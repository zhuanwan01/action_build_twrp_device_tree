name: Generate TWRP Device Tree

on:
  workflow_dispatch:
    inputs:
      LIBRARY_NAME:
        description: 'Library name for the device tree'
        required: true
        default: 'Twrp_Device_Generator'
      IMG_URL:
        description: 'URL to recovery/boot image'
        required: true
        default: 'https://github.com/momo54181/action_build_twrp_device_tree/raw/main/recovery.img'

jobs:
  generate-device-tree:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up environment
      run: |
        sudo apt-get update
        # 必须安装 lib32z1 以支持 AIK 的 32 位二进制文件 [cite: 2026-03-29]
        sudo apt-get install -y \
          python3 \
          python3-pip \
          python3-setuptools \
          cpio \
          wget \
          zip \
          unzip \
          file \
          lib32z1 \
          build-essential
        
    - name: Install TWRP generator
      run: |
        # 升级 pip 并安装核心工具
        python3 -m pip install --upgrade pip
        pip3 install --upgrade twrpdtgen sebaubuntu-libs
        
    - name: Download recovery image
      run: |
        wget -q --show-progress -O recovery.img "${{ github.event.inputs.IMG_URL }}"
        echo "Image info:"
        file recovery.img
      
    - name: Fix for OPPO Devices (Manual Prop Merging)
      run: |
        # 创建一个模拟的属性环境，防止 AssertionError [cite: 2026-03-29]
        # 如果你已经有了 system 或 vendor 的 build.prop，可以在此处用 wget 下载并合并
        # 这里演示创建一个基础的 prop.default 以欺骗工具
        mkdir -p prop_fix
        echo "ro.product.system.device=OPPO_DEVICE" > prop_fix/prop.default
        echo "ro.product.device=OPPO_DEVICE" >> prop_fix/prop.default
        echo "ro.build.product=OPPO_DEVICE" >> prop_fix/prop.default
        
    - name: Generate device tree
      run: |
        mkdir -p device_tree_output
        # 使用 sudo 运行以避免 AIK 在解包过程中遇到权限问题 [cite: 2026-03-29]
        # 注意：twrpdtgen 在遇到 OPPO 这种缺少属性的镜像时可能仍需手动调整源码
        sudo python3 -m twrpdtgen \
          -o device_tree_output \
          recovery.img || {
            echo "Generation failed, trying to debug AIK..."
            # 这里的失败通常就是你遇到的 return code 1
            exit 1
          }
        
    - name: Compress device tree
      if: success()
      run: |
        if [ -d "device_tree_output" ]; then
          cd device_tree_output
          zip -r ../DeviceTree_${{ github.run_number }}.zip .
          cd ..
        else
          echo "Output directory not found, skipping compression."
          exit 1
        fi
        
    - name: Create release with device tree
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        files: DeviceTree_${{ github.run_number }}.zip
        name: TWRP_Device_Tree_${{ github.run_number }}
        tag_name: dt-${{ github.run_number }}
        body: |
          Automatically generated TWRP device tree
          Build run: ${{ github.run_number }}
          Source image: ${{ github.event.inputs.IMG_URL }}
          Note: If this was an OPPO device, custom prop merging might be required.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
