name: Generate TWRP Device Tree

on:
  workflow_dispatch:
    inputs:
      LIBRARY_NAME:
        description: 'Library name for the device tree'
        required: true
        default: 'Twrp_Device_Generator'
      IMG_URL:
        description: 'URL to recovery/boot image'
        required: true
        default: 'https://github.com/momo54181/action_build_twrp_device_tree/raw/main/recovery.img'

jobs:
  generate-device-tree:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up environment
      run: |
        sudo apt-get update
        # 必须安装 lib32z1 以支持 AIK 的 32 位二进制文件 [cite: 2026-03-29]
        sudo apt-get install -y \
          python3 \
          python3-pip \
          python3-setuptools \
          cpio \
          wget \
          zip \
          unzip \
          file \
          lib32z1 \
          build-essential
        
    - name: Install TWRP generator
      run: |
        # 强制安装到全局系统路径，确保 sudo 环境能访问 [cite: 2026-03-29]
        sudo python3 -m pip install --upgrade pip
        sudo python3 -m pip install --upgrade twrpdtgen sebaubuntu-libs
        
    - name: Download recovery image
      run: |
        wget -q --show-progress -O recovery.img "${{ github.event.inputs.IMG_URL }}"
        echo "检查镜像类型..."
        file recovery.img
      
    - name: Generate device tree
      run: |
        mkdir -p device_tree_output
        # 使用 sudo 运行 twrpdtgen [cite: 2026-03-29]
        # 如果提示找不到模块，我们尝试直接调用其安装后的可执行路径
        sudo python3 -m twrpdtgen -o device_tree_output recovery.img || {
          echo "如果依然提示 No module named，尝试强制路径运行..."
          sudo $(which python3) -m twrpdtgen -o device_tree_output recovery.img
        }
        
    - name: Compress device tree
      if: success()
      run: |
        if [ -d "device_tree_output" ]; then
          cd device_tree_output
          zip -r ../DeviceTree_${{ github.run_number }}.zip .
          cd ..
        else
          echo "未发现生成目录"
          exit 1
        fi
        
    - name: Create release with device tree
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        files: DeviceTree_${{ github.run_number }}.zip
        name: TWRP_Device_Tree_${{ github.run_number }}
        tag_name: dt-${{ github.run_number }}
        body: |
          Build run: ${{ github.run_number }}
          Source image: ${{ github.event.inputs.IMG_URL }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
